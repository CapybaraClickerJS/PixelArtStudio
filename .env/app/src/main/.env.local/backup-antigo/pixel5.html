<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PixelArt Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e1e1e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        .header {
            padding: 12px 15px;
            background: #252525;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        h1 { font-size: 20px; color: #00ffcc; }
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            overflow: auto;
            padding: 10px;
        }
        canvas {
            image-rendering: pixelated;
            border: 2px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            touch-action: none;
        }
        .gear-btn {
            width: 45px; height: 45px;
            background: #333; border: none; border-radius: 50%;
            font-size: 24px;
        }
        .tool-bar {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: #252525; padding: 8px 12px; border-radius: 50px;
            display: flex; gap: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 100;
        }
        .tool-btn {
            width: 48px; height: 48px; font-size: 24px; background: #333;
            border: 2px solid #555; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            user-select: none;
        }
        .tool-btn.active { border-color: #00ffcc; background: #1e3a2f; }
        .tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; align-items: center;
            justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #252525; width: 92%; max-width: 400px; border-radius: 12px;
            padding: 20px; max-height: 90vh; overflow-y: auto;
        }
        button {
            padding: 12px; margin: 8px 0; width: 100%;
            border: none; border-radius: 8px; font-weight: bold;
            color: #fff;
        }
        label { display:block; margin-top: 10px; margin-bottom: 4px; }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #333;
            border: 1px solid #555;
            border-radius: 8px;
            color: white;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>PixelArt</h1>
            <span id="sizeInfo" style="color:#888; font-size:14px;">32×32</span>
        </div>
        <button class="gear-btn" onclick="toggleModal()">⚙️</button>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="pixelCanvas"></canvas>
    </div>

    <div class="tool-bar">
        <div class="tool-btn" onclick="undo()" id="undoBtn" style="font-size:26px;">↩️</div>
        <div class="tool-btn" onclick="redo()" id="redoBtn" style="font-size:26px;">↪️</div>
        
        <div class="tool-btn" onclick="zoomOut()" style="font-size:28px; font-weight:bold;">−</div>
        <div class="tool-btn" onclick="zoomIn()"  style="font-size:28px; font-weight:bold;">+</div>

        <div class="tool-btn active" onclick="setTool(0)">✏️</div>
        <div class="tool-btn" onclick="setTool(1)">🧼</div>
        <div class="tool-btn" onclick="setTool(3)">🎯</div>
        <div class="tool-btn" onclick="setTool(2)">🪣</div>
        <div onclick="downloadImage()" style="font-size:22px; padding:0 10px; display:flex; align-items:center;">⬇️</div>
    </div>

    <!-- Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>⚙️ Configurações</h2>
            
            <label>Nome da Imagem</label>
            <input type="text" id="imageName" value="MinhaArte">

            <label>Tamanho da Imagem</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="number" id="width" value="32" min="1" max="1024">
                <input type="number" id="height" value="32" min="1" max="1024">
            </div>
            <small style="color:#ffaa00; display:block; margin:8px 0;">
                ⚠️ Acima de 256×256 pode ficar lento no celular
            </small>

            <label>Tamanho Do Lápis</label>
            <input type="number" id="brushSize" value="1" min="1" max="1024" onchange="updateBrushSize()">
            <small style="color:#888; display:block; margin:8px 0;">
                O máximo muda conforme o tamanho da imagem
            </small>

            <button onclick="resizeCanvas()" style="background:#00cc88;">Aplicar Tamanho</button>

            <div style="margin: 20px 0; padding: 15px; background: #1e1e1e; border-radius: 10px;">
                <h3>🎨 Cor Atual</h3>
                <div id="colorPreview" style="height:55px; border-radius:8px; margin:10px 0; background:#ff0000;"></div>
                <div style="display:flex; gap:10px;">
                    <input type="color" id="colorPicker" value="#ff0000" style="width:70px;height:50px;padding:4px;">
                    <input type="text" id="hexInput" value="#ff0000" maxlength="7" 
                           style="flex:1; padding:12px; background:#333; border:1px solid #555; border-radius:8px; color:white; font-family:monospace;">
                </div>
            </div>

            <div style="margin: 20px 0; padding: 15px; background: #1e1e1e; border-radius: 10px;">
                <h3>🕒 Cores Recentes</h3>
                <div id="recentColors" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;"></div>
            </div>

            <input type="file" id="importFile" accept="image/png,.png" style="display:none" onchange="importPNGImage(event)">

            <button onclick="document.getElementById('importFile').click()" style="background:#6f42c1;">📥 Importar Imagem PNG</button>
            <button onclick="clearCanvas()" style="background:#ff4444;">🗑️ Limpar Canvas</button>
            <button onclick="toggleModal()" style="background:#555;">Fechar</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const container = document.getElementById('canvasContainer');
        
        let gridWidth = 32;
        let gridHeight = 32;
        let pixelSize = 12;
        let pixels = [];
        let currentColor = '#ff0000';
        let currentTool = 0;
        let isDrawing = false;
        let brushSize = 1;

        let history = [];
        let redoStack = [];
        const MAX_HISTORY = 20;

        let recentColors = [];

        function initPixels() {
            pixels = Array(gridHeight).fill().map(() => Array(gridWidth).fill('#000000'));
        }

        function saveHistory() {
            const stateCopy = pixels.map(row => [...row]);
            history.push(stateCopy);
            if (history.length > MAX_HISTORY) history.shift();
            redoStack = [];
            updateUndoRedoButtons();
        }

        function undo() {
            if (history.length === 0) return;
            redoStack.push(pixels.map(row => [...row]));
            pixels = history.pop();
            drawGrid();
            updateUndoRedoButtons();
        }

        function redo() {
            if (redoStack.length === 0) return;
            history.push(pixels.map(row => [...row]));
            pixels = redoStack.pop();
            drawGrid();
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').style.opacity = history.length === 0 ? '0.4' : '1';
            document.getElementById('redoBtn').style.opacity = redoStack.length === 0 ? '0.4' : '1';
        }

        function zoomIn() {
            pixelSize = Math.min(40, Math.floor(pixelSize * 1.3));
            applyZoom();
        }

        function zoomOut() {
            pixelSize = Math.max(6, Math.floor(pixelSize / 1.3));
            applyZoom();
        }

        function applyZoom() {
            canvas.width = gridWidth * pixelSize;
            canvas.height = gridHeight * pixelSize;
            drawGrid();
        }

        function sanitizeFileName(name) {
            return (name || 'MinhaArte')
                .trim()
                .replace(/[\\/:*?"<>|]+/g, '_')
                .replace(/\s+/g, '_');
        }

        function updateBrushConstraints() {
            const brushInput = document.getElementById('brushSize');
            const maxBrush = Math.max(1, Math.min(gridWidth, gridHeight));
            brushInput.max = String(maxBrush);

            let value = parseInt(brushInput.value, 10);
            if (!Number.isFinite(value) || value < 1) value = 1;
            if (value > maxBrush) value = maxBrush;

            brushInput.value = value;
            brushSize = value;
        }

        function updateBrushSize() {
            updateBrushConstraints();
        }

        // ==================== DOWNLOAD PNG ====================
        function downloadImage() {
            const name = sanitizeFileName(document.getElementById('imageName').value) || "MinhaArte";
            
            const temp = document.createElement('canvas');
            temp.width = gridWidth;
            temp.height = gridHeight;
            const tctx = temp.getContext('2d', { alpha: true });

            tctx.clearRect(0, 0, temp.width, temp.height);

            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    const color = pixels[y][x];
                    if (color !== '#000000') {
                        tctx.fillStyle = color;
                        tctx.fillRect(x, y, 1, 1);
                    }
                }
            }

            const link = document.createElement('a');
            link.download = `${name}(${gridWidth}x${gridHeight}).png`;
            link.href = temp.toDataURL('image/png');
            link.click();
        }

        function resizeCanvas() {
            let w = parseInt(document.getElementById('width').value) || 32;
            let h = parseInt(document.getElementById('height').value) || 32;

            if (w > 512 || h > 512) {
                if (!confirm("Tamanhos grandes podem travar no celular.\nContinuar?")) return;
            }

            gridWidth = Math.max(1, Math.min(1024, w));
            gridHeight = Math.max(1, Math.min(1024, h));

            const maxScreen = Math.min(window.innerWidth * 0.9, 650);
            pixelSize = Math.max(6, Math.floor(maxScreen / Math.max(gridWidth, gridHeight)));

            canvas.width = gridWidth * pixelSize;
            canvas.height = gridHeight * pixelSize;

            initPixels();
            history = [];
            redoStack = [];
            drawGrid();
            document.getElementById('sizeInfo').textContent = `${gridWidth}×${gridHeight}`;
            updateBrushConstraints();
            toggleModal();
            updateUndoRedoButtons();
        }

        function drawGrid() {
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            const data = imageData.data;

            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    const hex = pixels[y][x];
                    const r = parseInt(hex[1]+hex[2],16);
                    const g = parseInt(hex[3]+hex[4],16);
                    const b = parseInt(hex[5]+hex[6],16);

                    const sx = x * pixelSize;
                    const sy = y * pixelSize;

                    for (let py = 0; py < pixelSize; py++) {
                        for (let px = 0; px < pixelSize; px++) {
                            const i = ((sy + py) * canvas.width + (sx + px)) * 4;
                            data[i] = r;
                            data[i+1] = g;
                            data[i+2] = b;
                            data[i+3] = 255;
                        }
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function setPixel(x, y) {
            for (let by = 0; by < brushSize; by++) {
                for (let bx = 0; bx < brushSize; bx++) {
                    const px = x + bx;
                    const py = y + by;

                    if (px < 0 || px >= gridWidth || py < 0 || py >= gridHeight) continue;
                    pixels[py][px] = currentTool === 1 ? '#000000' : currentColor;
                }
            }
        }

        function drawPixel(x, y) {
            setPixel(x, y);
            drawGrid();
        }

        function floodFill(startX, startY) {
            if (startX < 0 || startX >= gridWidth || startY < 0 || startY >= gridHeight) return;

            const target = pixels[startY][startX];
            if (target === currentColor) return;
            saveHistory();

            const stack = [[startX, startY]];
            while (stack.length) {
                const [x, y] = stack.pop();
                if (x < 0 || x >= gridWidth || y < 0 || y >= gridHeight || pixels[y][x] !== target) continue;
                pixels[y][x] = currentColor;
                stack.push([x+1,y], [x-1,y], [x,y+1], [x,y-1]);
            }
            drawGrid();
        }

        function clearCanvas() {
            if (confirm("Limpar tudo?")) {
                saveHistory();
                initPixels();
                drawGrid();
            }
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            const buttons = document.querySelectorAll('.tool-btn');
            if (tool === 0 && buttons[4]) buttons[4].classList.add('active');
            if (tool === 1 && buttons[5]) buttons[5].classList.add('active');
            if (tool === 3 && buttons[6]) buttons[6].classList.add('active');
            if (tool === 2 && buttons[7]) buttons[7].classList.add('active');
        }

        function toggleModal() {
            const m = document.getElementById('settingsModal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function addRecentColor(color) {
            recentColors = [color, ...recentColors.filter(c => c !== color)].slice(0, 8);
            renderRecentColors();
        }

        function renderRecentColors() {
            const box = document.getElementById('recentColors');
            if (!box) return;

            box.innerHTML = '';
            recentColors.forEach(color => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.title = color;
                btn.onclick = () => updateColor(color);
                btn.style.cssText = `
                    width: 36px;
                    height: 36px;
                    padding: 0;
                    border: 2px solid #666;
                    border-radius: 8px;
                    background: ${color};
                `;
                box.appendChild(btn);
            });
        }

        function updateColor(newColor) {
            currentColor = newColor;
            document.getElementById('colorPreview').style.background = newColor;
            document.getElementById('colorPicker').value = newColor;
            document.getElementById('hexInput').value = newColor;
            addRecentColor(newColor);
        }

        function setupColorPicker() {
            const picker = document.getElementById('colorPicker');
            const hexInput = document.getElementById('hexInput');

            picker.addEventListener('input', () => updateColor(picker.value));
            hexInput.addEventListener('input', () => {
                let value = hexInput.value.trim();
                if (/^#[0-9A-Fa-f]{6}$/.test(value)) updateColor(value.toUpperCase());
            });

            updateColor(currentColor);
        }

        function importPNGImage(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;

            const img = new Image();
            const url = URL.createObjectURL(file);

            img.onload = () => {
                try {
                    const temp = document.createElement('canvas');
                    temp.width = img.width;
                    temp.height = img.height;
                    const tctx = temp.getContext('2d', { willReadFrequently: true });

                    tctx.clearRect(0, 0, temp.width, temp.height);
                    tctx.drawImage(img, 0, 0);

                    const imageData = tctx.getImageData(0, 0, temp.width, temp.height).data;

                    gridWidth = img.width;
                    gridHeight = img.height;
                    pixels = Array(gridHeight).fill().map(() => Array(gridWidth).fill('#000000'));

                    for (let y = 0; y < gridHeight; y++) {
                        for (let x = 0; x < gridWidth; x++) {
                            const i = (y * gridWidth + x) * 4;
                            const r = imageData[i];
                            const g = imageData[i + 1];
                            const b = imageData[i + 2];
                            const a = imageData[i + 3];

                            if (a === 0) {
                                pixels[y][x] = '#000000';
                            } else {
                                const hex = `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`.toUpperCase();
                                pixels[y][x] = hex;
                            }
                        }
                    }

                    const maxScreen = Math.min(window.innerWidth * 0.9, 650);
                    pixelSize = Math.max(6, Math.floor(maxScreen / Math.max(gridWidth, gridHeight)));

                    canvas.width = gridWidth * pixelSize;
                    canvas.height = gridHeight * pixelSize;

                    history = [];
                    redoStack = [];

                    document.getElementById('width').value = gridWidth;
                    document.getElementById('height').value = gridHeight;
                    document.getElementById('sizeInfo').textContent = `${gridWidth}×${gridHeight}`;

                    const baseName = file.name.replace(/\.[^/.]+$/, '');
                    document.getElementById('imageName').value = baseName || 'MinhaArte';

                    updateBrushConstraints();
                    drawGrid();
                    updateUndoRedoButtons();
                    toggleModal();
                } catch (err) {
                    alert("Erro ao importar a imagem PNG.");
                    console.error(err);
                } finally {
                    URL.revokeObjectURL(url);
                    event.target.value = '';
                }
            };

            img.onerror = () => {
                alert("Não consegui abrir essa imagem PNG.");
                URL.revokeObjectURL(url);
                event.target.value = '';
            };

            img.src = url;
        }

        function setupEvents() {
            canvas.addEventListener('pointerdown', e => {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / pixelSize);
                const y = Math.floor((e.clientY - rect.top) / pixelSize);

                if (currentTool === 2) {
                    floodFill(x, y);
                } else if (currentTool === 3) {
                    if (x < 0 || x >= gridWidth || y < 0 || y >= gridHeight) return;
                    updateColor(pixels[y][x]);
                } else {
                    saveHistory();
                    drawPixel(x, y);
                }
            });

            canvas.addEventListener('pointermove', e => {
                if (!isDrawing || currentTool >= 2) return;
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / pixelSize);
                const y = Math.floor((e.clientY - rect.top) / pixelSize);
                drawPixel(x, y);
            });

            window.addEventListener('pointerup', () => isDrawing = false);
            window.addEventListener('pointercancel', () => isDrawing = false);
        }

        window.onload = () => {
            initPixels();
            const maxScreen = Math.min(window.innerWidth * 0.9, 650);
            pixelSize = Math.max(8, Math.floor(maxScreen / 32));
            canvas.width = gridWidth * pixelSize;
            canvas.height = gridHeight * pixelSize;
            
            setupEvents();
            setupColorPicker();
            updateBrushConstraints();
            drawGrid();
            updateUndoRedoButtons();
            renderRecentColors();
        };
    </script>
</body>
</html>
